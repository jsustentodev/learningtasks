<html>
    <head>
        <title>..:4 boxes:..</title>
        <style type="text/css">
           body { background-color: #6e685; }
           .wrapper {
                background-color: #FFF;
                width: 400px;
                height: 400px;
                border-left: 2px solid #f5425a;
                border-right: 2px solid #f542c2;
                border-top: 2px solid #5142f5;
                border-bottom: 2px solid #5142f5;
            }
            .wrapper div {
                width: 192px;
                height: 192px;
                margin: 2px;
                border: 2px solid red;
                float: left;
            }
            .box1 {
                background-color: #7fb319;
            }
            .box2 {
                background-color: #b39e19;
            }
            .box3 {
                background-color: #b3194c;
            }
            .box4 {
                background-color: #1928b3;
            }

        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box3"></div>
            <div class="box4"></div>
        </div>
    </body>
</html>
